name: Build macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Image Replacer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild \
            -project ImageReplacer.xcodeproj \
            -scheme ImageReplacer \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/Image Replacer.app"
          codesign --force --deep --sign - "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "Image-Replacer-macOS.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image-Replacer-macOS
          path: Image-Replacer-macOS.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "Image-Replacer-macOS.zip" \
            --title "Image Replacer ${GITHUB_REF_NAME}" \
            --notes "Download Image-Replacer-macOS.zip, unzip it, and move Image Replacer.app to Applications."
